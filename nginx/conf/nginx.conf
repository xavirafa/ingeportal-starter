# nginx.conf — Configuracion basica para servir el frontend React en produccion
# y hacer proxy al backend FastAPI
#
# Ajustar:
#   - root: ruta absoluta a frontend/dist/
#   - proxy_pass: puerto del backend (8000 por defecto)
#   - listen: puerto en que escuchara nginx (5173 por defecto, cambiar a 80/443 si tienes dominio)

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # Comprimir respuestas de texto
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen       5173;
        server_name  localhost;

        # ── Frontend React (SPA) ───────────────────────────────────────────
        # Cambiar la ruta a la ubicacion real de tu frontend/dist/
        root   C:/ruta/a/tu/proyecto/frontend/dist;
        index  index.html;

        # Todas las rutas del SPA van al index.html (react-router)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Proxy al backend FastAPI ───────────────────────────────────────
        location /api/ {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            proxy_send_timeout 300;
        }

        # ── WebSockets ────────────────────────────────────────────────────
        location /ws/ {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host $host;
            proxy_read_timeout 86400;
        }

        # ── Archivos estaticos con cache largo ────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
